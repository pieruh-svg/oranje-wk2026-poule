<!DOCTYPE html>
<html lang="nl"><head><meta charset="UTF-8"><script src="https://cdn.tailwindcss.com"></script><title>WK 2026 Poule</title></head>
<body class="bg-gray-100 p-4">
    <header class="bg-orange-500 text-white p-6 rounded-xl text-center mb-6 relative">
        <h1 class="text-3xl font-black">🦁 ORANJE WK 2026 POULE</h1>
        <button onclick="loadData()" class="absolute top-6 right-6 bg-white text-orange-500 font-bold px-4 py-2 rounded-full">🔄 Ververs</button>
    </header>
    <main class="grid md:grid-cols-3 gap-6">
        <div class="space-y-6">
            <div class="bg-white p-5 rounded-xl shadow"><h2 class="font-bold mb-2">Meedoen</h2><input id="regNaam" placeholder="Naam" class="w-full border p-2 mb-2"><input id="regCampioen" placeholder="Wereldkampioen?" class="w-full border p-2 mb-2"><button onclick="registreer()" class="w-full bg-orange-500 text-white p-2">Deelnemen</button></div>
            <div class="bg-white p-5 rounded-xl shadow"><h2 class="font-bold mb-2">🏆 Ranglijst</h2><table class="w-full" id="ranglijstBody"></table></div>
        </div>
        <div class="md:col-span-2 space-y-6">
            <div class="bg-white p-5 rounded-xl shadow"><select id="userSelector" onchange="loadData()" class="w-full p-2 border mb-4"><option value="">-- Kies naam --</option></select><div id="wedstrijdenContainer" class="space-y-2"></div></div>
            <div class="bg-gray-800 text-white p-5 rounded-xl space-y-4">
                <h2 class="text-orange-400 font-bold">🔒 Admin: Beheer</h2>
                <div class="grid grid-cols-4 gap-2 text-black"><select id="adminMatch" class="p-1"></select><input id="adminThuis" placeholder="Thuis" class="p-1"><input id="adminUit" placeholder="Uit" class="p-1"><button onclick="opslaanUitslag()" class="bg-green-500 text-white">Save</button></div>
                <div class="grid grid-cols-2 gap-2"><input id="newDate" placeholder="Datum" class="text-black p-1"><input id="newThuis" placeholder="Thuis" class="text-black p-1"><input id="newUit" placeholder="Uit" class="text-black p-1"><button onclick="nieuweWedstrijd()" class="bg-blue-500">Add</button></div>
                <select id="deleteMatchSelect" class="text-black w-full p-1"></select><button onclick="verwijderWedstrijd()" class="bg-red-600 w-full">Delete Match</button>
                <input id="adminPassword" type="password" placeholder="Pass" class="text-black w-full p-1">
            </div>
        </div>
    </main>
    <script>
        let appData = {};
        async function loadData() {
            appData = await (await fetch('/api/data')).json();
            document.getElementById('ranglijstBody').innerHTML = appData.deelnemers.map((d,i) => `<tr><td>${i+1}</td><td>${d.naam}</td><td>${d.punten}</td><td><button onclick="verwijderSpeler(${d.id})">❌</button></td></tr>`).join('');
            document.getElementById('userSelector').innerHTML = '<option value="">-- Kies naam --</option>' + appData.deelnemers.map(d => `<option value="${d.id}">${d.naam}</option>`).join('');
            document.getElementById('adminMatch').innerHTML = appData.wedstrijden.map(w => `<option value="${w.id}">${w.thuis_team}-${w.uit_team}</option>`).join('');
            document.getElementById('deleteMatchSelect').innerHTML = appData.wedstrijden.map(w => `<option value="${w.id}">${w.thuis_team}-${w.uit_team}</option>`).join('');
            const uid = document.getElementById('userSelector').value;
            document.getElementById('wedstrijdenContainer').innerHTML = appData.wedstrijden.map(w => `<div>${w.thuis_team} vs ${w.uit_team} <input id="vT-${w.id}" type="number" class="w-12 border"> - <input id="vU-${w.id}" type="number" class="w-12 border"> <button onclick="saveV(${w.id})">Save</button></div>`).join('');
        }
        async function saveV(mid) {
            const uid = document.getElementById('userSelector').value;
            await fetch('/api/voorspellingen', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({deelnemer_id:uid, wedstrijd_id:mid, voorspelling_thuis:document.getElementById('vT-'+mid).value, voorspelling_uit:document.getElementById('vU-'+mid).value}) });
            loadData();
        }
        async function registreer() { await fetch('/api/deelnemers', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({naam:document.getElementById('regNaam').value, wereldkampioen:document.getElementById('regCampioen').value}) }); loadData(); }
        async function opslaanUitslag() { await fetch('/api/admin/uitslag', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:document.getElementById('adminPassword').value, wedstrijd_id:document.getElementById('adminMatch').value, uitslag_thuis:document.getElementById('adminThuis').value, uitslag_uit:document.getElementById('adminUit').value, status:'GESPEELD'}) }); loadData(); }
        async function nieuweWedstrijd() { await fetch('/api/admin/nieuwe-wedstrijd', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:document.getElementById('adminPassword').value, datum:document.getElementById('newDate').value, thuis:document.getElementById('newThuis').value, uit:document.getElementById('newUit').value}) }); loadData(); }
        async function verwijderWedstrijd() { await fetch('/api/admin/verwijder-wedstrijd', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:document.getElementById('adminPassword').value, wedstrijd_id:document.getElementById('deleteMatchSelect').value}) }); loadData(); }
        async function verwijderSpeler(id) { await fetch('/api/admin/verwijder-speler', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:document.getElementById('adminPassword').value, herstel_id:id}) }); loadData(); }
        loadData();
    </script>
</body></html>
